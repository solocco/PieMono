name: Build PieMono

on:
  schedule:
    - cron: "0 12 * * 1,3"
  workflow_dispatch:
    inputs:
      iosevka_tag:
        description: "Iosevka tag to build (leave empty for latest)"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      iosevka_tag: ${{ steps.check.outputs.iosevka_tag }}
      nf_tag: ${{ steps.check.outputs.nf_tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    permissions:
      contents: read
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.iosevka_tag }}" ]; then
            IOSEVKA_TAG="${{ inputs.iosevka_tag }}"
          else
            IOSEVKA_TAG=$(gh api repos/be5invis/Iosevka/releases/latest --jq '.tag_name') || {
              echo "::error::Failed to fetch latest Iosevka release"
              exit 1
            }
          fi
          if [ -z "$IOSEVKA_TAG" ]; then
            echo "::error::Got empty tag for latest Iosevka release"
            exit 1
          fi

          NF_TAG=$(gh api repos/ryanoasis/nerd-fonts/releases/latest --jq '.tag_name') || {
            echo "::error::Failed to fetch latest Nerd Fonts release"
            exit 1
          }
          if [ -z "$NF_TAG" ]; then
            echo "::error::Got empty tag for latest Nerd Fonts release"
            exit 1
          fi

          echo "iosevka_tag=$IOSEVKA_TAG" >> "$GITHUB_OUTPUT"
          echo "nf_tag=$NF_TAG" >> "$GITHUB_OUTPUT"

          HTTP_CODE=$(gh api repos/${{ github.repository }}/releases/tags/"$IOSEVKA_TAG" \
            --silent -i 2>&1 | head -1 | awk '{print $2}')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Already built $IOSEVKA_TAG — skipping"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Will build $IOSEVKA_TAG with Nerd Fonts $NF_TAG"
          else
            echo "::error::Unexpected response ($HTTP_CODE) checking for existing release"
            exit 1
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: be5invis/Iosevka
          ref: ${{ needs.check.outputs.iosevka_tag }}
          path: iosevka
          show-progress: false

      - name: Copy build plan
        run: cp private-build-plans.toml iosevka/

      - run: sudo apt-get update && sudo apt-get install -y ttfautohint fontforge

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
        working-directory: iosevka

      - name: Build PieMono
        working-directory: iosevka
        run: npm run build -- ttf::PieMono

      - name: Download Nerd Fonts patcher
        env:
          NF_TAG: ${{ needs.check.outputs.nf_tag }}
        run: |
          wget -q "https://github.com/ryanoasis/nerd-fonts/releases/download/${NF_TAG}/FontPatcher.zip"
          unzip -q FontPatcher.zip -d FontPatcher

      - name: Patch PieMono with Nerd Fonts
        run: |
          mkdir -p patched/PieMono
          for ttf in iosevka/dist/PieMono/TTF/*.ttf; do
            fontforge -script FontPatcher/font-patcher \
              --complete --no-progressbars --quiet \
              --outputdir patched/PieMono "$ttf"
          done

      - name: Package fonts
        run: |
          cd iosevka/dist/PieMono/TTF
          zip -r "$GITHUB_WORKSPACE/PieMono-TTF.zip" .
          tar cJf "$GITHUB_WORKSPACE/PieMono-TTF.tar.xz" .
          cd "$GITHUB_WORKSPACE"

          cd patched/PieMono
          zip -r "$GITHUB_WORKSPACE/PieMono-NerdFont.zip" .
          tar cJf "$GITHUB_WORKSPACE/PieMono-NerdFont.tar.xz" .

      - uses: actions/upload-artifact@v4
        with:
          name: PieMono-${{ needs.check.outputs.iosevka_tag }}
          path: |
            PieMono-TTF.zip
            PieMono-TTF.tar.xz
            PieMono-NerdFont.zip
            PieMono-NerdFont.tar.xz

      - name: Create release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          IOSEVKA_TAG: ${{ needs.check.outputs.iosevka_tag }}
          NF_TAG: ${{ needs.check.outputs.nf_tag }}
        run: |
          SHA=$(git -C iosevka rev-parse HEAD)
          cat > release-notes.md << EOF
          Built from [Iosevka ${IOSEVKA_TAG}](https://github.com/be5invis/Iosevka/releases/tag/${IOSEVKA_TAG}) (commit \`${SHA}\`)
          Patched with [Nerd Fonts ${NF_TAG}](https://github.com/ryanoasis/nerd-fonts/releases/tag/${NF_TAG})

          ### Assets
          | File | Keterangan |
          |------|------------|
          | \`PieMono-TTF\` | Font original tanpa patch |
          | \`PieMono-NerdFont\` | Patched Nerd Font Complete |
          EOF

          gh release create "$IOSEVKA_TAG" \
            PieMono-TTF.zip \
            PieMono-TTF.tar.xz \
            PieMono-NerdFont.zip \
            PieMono-NerdFont.tar.xz \
            --title "PieMono ($IOSEVKA_TAG)" \
            --notes-file release-notes.md

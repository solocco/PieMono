[buildPlans.PieMono]
family = "Pie Mono"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false
[buildPlans.PieMono.variants]
inherits = "ss04"
[buildPlans.PieMono.variants.design]
zero = "dotted"
one = "no-base"
a = "double-storey-toothless-rounded"
b = "toothless-rounded-serifless"
d = "toothless-rounded-serifless"
f = "serifless"
g = "single-storey-flat-hook-earless-rounded"
i = "hooky"
j = "flat-hook-serifless"
l = "tailed"
n = "earless-corner-straight-serifless"
p = "earless-rounded-serifless"
q = "earless-rounded-straight-serifless"
r = "earless-rounded-serifless"
t = "flat-hook"
u = "toothless-rounded-serifless"
y = "straight-turn-serifless"
capital-i = "serifless"
capital-j = "serifless"
capital-k = "straight-serifless"
capital-m = "flat-bottom-serifless"
capital-q = "crossing"
capital-r = "standing-serifless"
capital-w = "straight-serifless"
[buildPlans.PieMono.weights.Regular]
shape = 400
menu = 400
css = 400
[buildPlans.PieMono.weights.Medium]
shape = 500
menu = 500
css = 500
[buildPlans.PieMono.weights.Bold]
shape = 700
menu = 700
css = 700
[buildPlans.PieMono.widths.Normal]
shape = 600
menu = 5
css = "normal"
[buildPlans.PieMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"
[buildPlans.PieMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
